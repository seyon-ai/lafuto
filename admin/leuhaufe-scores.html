<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeUHaute Scores — LaTAFU Admin</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    body{background:var(--gray-50)}.layout{display:flex;min-height:100vh}.main{flex:1;margin-left:260px;padding:32px}@media(max-width:900px){.main{margin-left:0;padding:20px}}
    .score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:24px}
    .teacher-score-card{background:white;border:1px solid var(--gray-100);border-radius:var(--radius-xl);padding:24px;transition:var(--transition)}
    .teacher-score-card:hover{box-shadow:var(--shadow-md)}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">La<span style="color:var(--primary)">TAFU</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Admin Panel</div>
        <a class="sidebar-link" href="dashboard.html"><span class="link-icon">🏠</span> Dashboard</a>
        <a class="sidebar-link" href="users.html"><span class="link-icon">👥</span> Users</a>
        <a class="sidebar-link" href="violations.html"><span class="link-icon">🚨</span> Violations</a>
        <a class="sidebar-link active" href="leuhaufe-scores.html"><span class="link-icon">✦</span> LeUHaute Scores</a>
        <a class="sidebar-link" href="payments.html"><span class="link-icon">💰</span> Payments</a>
        <a class="sidebar-link" href="settings.html"><span class="link-icon">⚙️</span> Settings</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-sm" style="background:rgba(255,71,87,0.1);color:var(--danger)">A</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name">Admin</div><div class="sidebar-user-role" style="color:var(--danger)">Administrator</div></div>
        <span style="cursor:pointer;color:var(--text-muted)" onclick="doLogout()">⏻</span>
      </div>
    </div>
  </aside>
  <main class="main">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:12px">
      <div><h2>LeUHaute™ Scores</h2><p style="color:var(--text-muted)">All teacher AI interview scores</p></div>
      <select class="form-select" id="tierFilter" onchange="filterScores()" style="width:auto">
        <option value="">All Tiers</option>
        <option value="Platinum">Platinum 💎</option>
        <option value="Gold">Gold 🥇</option>
        <option value="Silver">Silver 🥈</option>
        <option value="Bronze">Bronze 🥉</option>
        <option value="none">Not Completed</option>
      </select>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
      <div class="stat-card"><div style="font-size:1.5rem;margin-bottom:8px">💎</div><div class="stat-card-value" id="platCount">0</div><div class="stat-card-label">Platinum</div></div>
      <div class="stat-card"><div style="font-size:1.5rem;margin-bottom:8px">🥇</div><div class="stat-card-value" id="goldCount">0</div><div class="stat-card-label">Gold</div></div>
      <div class="stat-card"><div style="font-size:1.5rem;margin-bottom:8px">🥈</div><div class="stat-card-value" id="silverCount">0</div><div class="stat-card-label">Silver</div></div>
      <div class="stat-card"><div style="font-size:1.5rem;margin-bottom:8px">🥉</div><div class="stat-card-value" id="bronzeCount">0</div><div class="stat-card-label">Bronze</div></div>
    </div>

    <div class="score-grid" id="scoreGrid">
      ${Array(6).fill(`<div style="background:white;border-radius:var(--radius-xl);padding:24px;border:1px solid var(--gray-100)"><div class="skeleton skeleton-text w-75" style="height:20px;margin-bottom:12px"></div><div class="skeleton skeleton-text w-50"></div></div>`).join('')}
    </div>
  </main>
</div>
<script type="module">
  import { requireAdminAuth, logout } from '../js/auth.js';
  import { db } from '../js/firebase-config.js';
  import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  requireAdminAuth();
  window.doLogout = async () => { await logout(); };

  let allTeachers = [];

  async function load() {
    const snap = await getDocs(collection(db,'teachers'));
    allTeachers = snap.docs.map(d=>({id:d.id,...d.data()}));
    document.getElementById('platCount').textContent = allTeachers.filter(t=>t.leuhaufeTier==='Platinum').length;
    document.getElementById('goldCount').textContent = allTeachers.filter(t=>t.leuhaufeTier==='Gold').length;
    document.getElementById('silverCount').textContent = allTeachers.filter(t=>t.leuhaufeTier==='Silver').length;
    document.getElementById('bronzeCount').textContent = allTeachers.filter(t=>t.leuhaufeTier==='Bronze').length;
    renderScores();
  }

  window.filterScores = renderScores;

  function renderScores() {
    const tier = document.getElementById('tierFilter').value;
    let filtered = [...allTeachers];
    if (tier === 'none') filtered = filtered.filter(t=>!t.leuhaufeScore);
    else if (tier) filtered = filtered.filter(t=>t.leuhaufeTier===tier);
    filtered.sort((a,b)=>(b.leuhaufeScore||0)-(a.leuhaufeScore||0));

    const grid = document.getElementById('scoreGrid');
    if (!filtered.length) { grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><p>No teachers found</p></div>`; return; }

    grid.innerHTML = filtered.map(t=>`
      <div class="teacher-score-card animate-fadeInUp">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div class="avatar avatar-md" style="background:rgba(26,115,232,0.1);color:var(--primary)">${(t.name||'T').charAt(0)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;color:var(--navy)">${t.name||'Teacher'}</div>
            <div style="font-size:0.78rem;color:var(--text-muted)">${(t.subjects||[]).slice(0,2).join(', ')||'—'}</div>
          </div>
          ${t.leuhaufeScore?`<div style="text-align:right"><div style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--gold)">${t.leuhaufeScore}</div><div style="font-size:0.68rem;color:var(--text-muted)">${t.leuhaufeTier||''}</div></div>`:'<span class="badge badge-navy" style="font-size:0.68rem">Pending</span>'}
        </div>
        ${t.leuhaufeData?.scores?`
        <div style="display:flex;flex-direction:column;gap:6px">
          ${[['Clarity',t.leuhaufeData.scores.teachingClarity],['Mastery',t.leuhaufeData.scores.subjectMastery],['Patience',t.leuhaufeData.scores.studentPatience]].map(([l,v])=>v?`
          <div style="display:flex;align-items:center;gap:8px">
            <div style="font-size:0.72rem;color:var(--text-muted);width:56px">${l}</div>
            <div style="flex:1;height:4px;background:var(--gray-100);border-radius:99px;overflow:hidden"><div style="height:100%;width:${v}%;background:var(--gold);border-radius:99px"></div></div>
            <div style="font-size:0.72rem;font-weight:700;color:var(--gold);width:28px">${v}%</div>
          </div>`:'').join('')}
        </div>`:'<div style="font-size:0.82rem;color:var(--text-muted);text-align:center;padding:12px 0">Interview not completed</div>'}
        ${t.leuhaufeData?.verdict?`<div style="margin-top:12px;font-size:0.78rem;color:var(--gray-700);font-style:italic;line-height:1.5;background:var(--gray-50);padding:10px;border-radius:var(--radius-sm)">"${t.leuhaufeData.verdict}"</div>`:''}
      </div>`).join('');
  }

  load();
</script>
</body>
</html>
