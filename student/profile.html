<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — LaTAFU Student</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    body{background:var(--gray-50)}.layout{display:flex;min-height:100vh}.main{flex:1;margin-left:260px;padding:32px;max-width:800px}@media(max-width:900px){.main{margin-left:0;padding:20px}}
    .profile-card{background:white;border-radius:var(--radius-xl);padding:36px;border:1px solid var(--gray-100);margin-bottom:20px}
    .avatar-section{display:flex;align-items:center;gap:20px;margin-bottom:28px}
    .avatar-upload{position:relative;cursor:pointer}
    .avatar-upload-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;font-size:1.2rem}
    .avatar-upload:hover .avatar-upload-overlay{opacity:1}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">La<span style="color:var(--primary)">TAFU</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Main</div>
        <a class="sidebar-link" href="dashboard.html"><span class="link-icon">🏠</span> Dashboard</a>
        <a class="sidebar-link" href="search.html"><span class="link-icon">🔍</span> Find Teachers</a>
        <a class="sidebar-link" href="chats.html"><span class="link-icon">💬</span> My Chats</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Account</div>
        <a class="sidebar-link active" href="profile.html"><span class="link-icon">👤</span> My Profile</a>
        <a class="sidebar-link" href="subscription.html"><span class="link-icon">⭐</span> Subscription</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar avatar-sm" id="sidebarAvatar">S</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebarName">Student</div><div class="sidebar-user-role">Student</div></div>
        <span style="cursor:pointer;color:var(--text-muted)" onclick="doLogout()">⏻</span>
      </div>
    </div>
  </aside>
  <main class="main">
    <h2 style="margin-bottom:6px">My Profile</h2>
    <p style="color:var(--text-muted);margin-bottom:24px">Update your information</p>
    <div id="successAlert" class="alert alert-success hidden" style="margin-bottom:16px">✅ Profile updated successfully!</div>
    <div class="profile-card animate-fadeInUp">
      <div class="avatar-section">
        <div class="avatar-upload" onclick="document.getElementById('avatarInput').click()">
          <div class="avatar avatar-xl" id="avatarDisplay" style="background:rgba(26,115,232,0.1);color:var(--primary);font-size:2.5rem">S</div>
          <div class="avatar-upload-overlay">📷</div>
        </div>
        <div>
          <h3 id="displayName">Student</h3>
          <p style="font-size:0.85rem;color:var(--text-muted)">Click avatar to change photo</p>
          <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(event)">
        </div>
      </div>
      <div class="auth-form" style="display:flex;flex-direction:column;gap:16px" id="profileForm">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="name" placeholder="Your name"></div>
          <div class="form-group"><label class="form-label">City</label><input type="text" class="form-input" id="city" placeholder="Your city"></div>
        </div>
        <div class="form-group"><label class="form-label">Grade / Level</label>
          <select class="form-select" id="grade">
            <option value="">Select grade</option>
            <option>Grade 6–8 (Middle School)</option><option>Grade 9–10 (Secondary)</option>
            <option>Grade 11–12 (Higher Secondary)</option><option>Undergraduate</option>
            <option>Postgraduate</option><option>Professional / Adult Learner</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Bio / About Me</label><textarea class="form-textarea" id="bio" placeholder="Tell teachers about yourself..." rows="3"></textarea></div>
        <button class="btn btn-primary" onclick="saveProfile()"><span class="btn-text">Save Changes</span></button>
      </div>
    </div>
  </main>
</div>
<script type="module">
  import { requireStudentAuth, logout, getProfile, updateProfile, getStoredUid } from '../js/auth.js';
  requireStudentAuth();
  const uid = getStoredUid();
  const name = localStorage.getItem('latfu_name')||'Student';
  document.getElementById('sidebarName').textContent = name;
  document.getElementById('sidebarAvatar').textContent = name.charAt(0);
  window.doLogout = async () => { await logout(); };

  async function load() {
    const p = await getProfile(uid, 'student');
    if (!p) return;
    document.getElementById('name').value = p.name||'';
    document.getElementById('city').value = p.city||'';
    document.getElementById('grade').value = p.grade||'';
    document.getElementById('bio').value = p.bio||'';
    document.getElementById('displayName').textContent = p.name||'Student';
    document.getElementById('sidebarAvatar').textContent = (p.name||'S').charAt(0);
    if (p.avatar) { document.getElementById('avatarDisplay').innerHTML = `<img src="${p.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`; }
    else document.getElementById('avatarDisplay').textContent = (p.name||'S').charAt(0);
  }

  window.saveProfile = async function() {
    const btn = document.querySelector('#profileForm .btn-primary');
    btn.classList.add('btn-loading'); btn.disabled = true;
    try {
      const name = document.getElementById('name').value.trim();
      await updateProfile(uid, 'student', { name, city: document.getElementById('city').value.trim(), grade: document.getElementById('grade').value, bio: document.getElementById('bio').value.trim() });
      localStorage.setItem('latfu_name', name);
      document.getElementById('successAlert').classList.remove('hidden');
      setTimeout(() => document.getElementById('successAlert').classList.add('hidden'), 3000);
    } catch(e) { alert(e.message); }
    btn.classList.remove('btn-loading'); btn.disabled = false;
  };

  window.uploadAvatar = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const form = new FormData();
    form.append('image', file);
    form.append('key', 'YOUR_IMGBB_API_KEY');
    try {
      const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: form });
      const data = await res.json();
      if (data.data?.url) {
        await updateProfile(uid, 'student', { avatar: data.data.url });
        document.getElementById('avatarDisplay').innerHTML = `<img src="${data.data.url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
      }
    } catch(e) { alert('Failed to upload image'); }
  };

  load();
</script>
</body>
</html>
